name: Auto-bump mod_version after Gate 3 merge

# Fires once after every squash-merge to main, computes the next MINOR version,
# commits + pushes to main using GITHUB_TOKEN. Mirrors the sibling-mod convention
# (PATCH during dev, MINOR on Gate 3 merge). discordpresence has no auto-release
# cascade, so there is no chore(auto): guard — only the self-trigger guard.

on:
  push:
    branches: [main]
  workflow_dispatch:        # Manual re-fire after fixing a malformed gradle.properties

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Don't fire on our own bump commit. GITHUB_TOKEN-authored pushes already
    # don't trigger workflow runs (built-in GH Actions safety); this guard is a
    # fallback if a PAT is wired in later.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(version): bump to') }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the bump push isn't a non-fast-forward

      - name: Validate gradle.properties is well-formed
        run: |
          set -euo pipefail
          if grep -qE '^(<{7}|={7}|>{7})' gradle.properties; then
            echo "::error file=gradle.properties::gradle.properties contains git conflict markers — refusing to auto-bump"
            grep -nE '^(<{7}|={7}|>{7})' gradle.properties
            exit 1
          fi
          VERSION_LINES=$(grep -cE '^mod_version=' gradle.properties || true)
          if [ "$VERSION_LINES" -ne 1 ]; then
            echo "::error file=gradle.properties::Expected exactly 1 mod_version= line, found $VERSION_LINES"
            exit 1
          fi
          CURRENT=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error file=gradle.properties::mod_version='$CURRENT' is not a strict X.Y.Z numeric version"
            exit 1
          fi
          echo "✓ gradle.properties valid (mod_version=$CURRENT)"

      - name: Compute and apply MINOR bump
        id: bump
        run: |
          set -euo pipefail
          CURRENT=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          if [ "$PATCH" = "0" ]; then
            echo "PATCH already 0 — $CURRENT is MINOR-aligned (fresh release / manual bump). Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          echo "Bumping mod_version: $CURRENT -> $NEW_VERSION"
          sed -i "s/^mod_version=.*/mod_version=$NEW_VERSION/" gradle.properties
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.skipped != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(version): bump to $NEW_VERSION (MINOR — Gate 3 merge) [skip ci]"
          git push
